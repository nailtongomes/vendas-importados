{% extends "base.html" %}

{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">Estoque</h1>
    <p class="text-slate-500 mt-1">Gerencie suas unidades e atualize o status dos produtos.</p>
</div>

<div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-4 md:p-6 overflow-x-auto">
    <div class="mb-4 flex items-center gap-3">
        <label class="text-sm font-medium text-slate-600">Filtrar status:</label>
        <select id="statusFilter" class="border rounded p-1.5 text-sm w-40">
            <option value="AVAILABLE" selected>Disponível</option>
            <option value="SOLD">Vendido</option>
            <option value="DEFECT">Defeito</option>
            <option value="">Todos</option>
        </select>
    </div>
    <table id="inventoryTable"
        class="w-full text-left text-sm display responsive nowrap">
        <thead>
            <tr class="text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200 bg-slate-50/50">
                <th class="p-3 font-semibold rounded-tl-lg">Serial</th>
                <th class="p-3 font-semibold">Modelo</th>
                <th class="p-3 font-semibold">Holder</th>
                <th class="p-3 font-semibold">Custo (R$)</th>
                <th class="p-3 font-semibold">Status</th>
                <th class="p-3 font-semibold rounded-tr-lg">Ações</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
            <!-- Load JSON via JS -->
        </tbody>
    </table>
</div>

<!-- FAB: Nova Unidade -->
<button id="fabBtn"
    class="fixed bottom-20 md:bottom-10 right-6 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-full p-4 shadow-lg shadow-blue-500/30 hover:shadow-xl hover:scale-105 transition-all duration-300 z-40 flex items-center justify-center cursor-pointer"
    title="Nova Unidade">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 relative z-10" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
    </svg>
</button>

<!-- Modal: Nova Unidade -->
<div id="modalNovaUnidade"
    class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 transition-opacity">
    <div class="modal-card bg-white w-full max-w-md overflow-hidden transform transition-all">
        <div class="flex justify-between items-center p-5 border-b border-slate-100 bg-slate-50/50">
            <h2 class="text-xl font-bold text-slate-800 tracking-tight">Nova Unidade</h2>
            <button id="btnCloseModal"
                class="text-slate-400 hover:text-slate-600 text-2xl leading-none transition-colors">&times;</button>
        </div>
        <div class="p-5 space-y-4">
            <div>
                <label class="block text-sm text-gray-600 mb-1">Lote *</label>
                <select id="unitLot" class="w-full border rounded p-2 text-sm">
                    <option value="">Carregando lotes...</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Modelo *</label>
                    <input type="text" id="unitModelName" class="w-full border rounded p-2 text-sm"
                        placeholder="Ex: iPhone 15 Pro">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Armazenamento (GB)</label>
                    <input type="number" id="unitStorageGb" class="w-full border rounded p-2 text-sm" placeholder="256">
                </div>
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Serial / IMEI *</label>
                <input type="text" id="unitSerial" class="w-full border rounded p-2 text-sm" placeholder="Serial único">
            </div>
            <div>
                <label class="block text-sm text-gray-600 mb-1">Custo USD *</label>
                <input type="number" id="unitUsdCost" class="w-full border rounded p-2 text-sm" placeholder="0.00"
                    step="0.01" min="0">
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Quantidade *</label>
                    <input type="number" id="unitQuantity" class="w-full border rounded p-2 text-sm" value="1" min="1">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">Holder</label>
                    <input type="text" id="unitHolder" class="w-full border rounded p-2 text-sm"
                        placeholder="Com quem está (opcional)">
                </div>
            </div>
        </div>
        <div class="p-5 border-t border-slate-100 bg-slate-50/50 flex justify-end space-x-3">
            <button id="btnCancelModal"
                class="px-5 py-2.5 bg-slate-200 text-slate-700 rounded-xl hover:bg-slate-300 text-sm font-semibold transition-colors">Cancelar</button>
            <button id="btnSaveUnit"
                class="px-5 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 text-sm font-bold shadow-sm transition-colors">Salvar</button>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    let dtTable;

    $(document).ready(function () {
        dtTable = $('#inventoryTable').DataTable({
            ajax: '/api/units',
            responsive: true,
            dom: 'Bfrtip',
            buttons: [
                { extend: 'copyHtml5', text: 'Copiar', exportOptions: { columns: [0, 1, 2, 3, 4] } },
                { extend: 'excelHtml5', text: 'Excel', exportOptions: { columns: [0, 1, 2, 3, 4] } }
            ],
            columns: [
                { data: 'serial', responsivePriority: 3 },
                { data: 'model_label', responsivePriority: 1 },
                {
                    data: 'holder',
                    responsivePriority: 5,
                    render: function (data, type, row) {
                        if (type !== 'display') return data;
                        return `<input type="text" class="border rounded p-1 w-28 text-sm edit-holder" data-id="${row.id}" value="${data || ''}">`;
                    }
                },
                {
                    data: 'total_cost_brl',
                    responsivePriority: 4,
                    render: function (data) {
                        return `R$ ${parseFloat(data).toFixed(2)}`;
                    }
                },
                {
                    data: 'status',
                    responsivePriority: 2,
                    render: function (data, type, row) {
                        if (type !== 'display') return data;
                        return `
                        <select class="border rounded p-1 w-28 text-sm edit-status" data-id="${row.id}">
                            <option value="AVAILABLE" ${data === 'AVAILABLE' ? 'selected' : ''}>Disponível</option>
                            <option value="SOLD" ${data === 'SOLD' ? 'selected' : ''}>Vendido</option>
                            <option value="DEFECT" ${data === 'DEFECT' ? 'selected' : ''}>Defeito</option>
                        </select>`;
                    }
                },
                {
                    data: null,
                    orderable: false,
                    responsivePriority: 1,
                    render: function (data, type, row) {
                        return `
                        <div class="flex space-x-1">
                            <a href="/unidade/${row.id}" class="text-blue-600 hover:text-blue-800 text-xs font-medium px-2 py-1 rounded border border-blue-300">Ver</a>
                            <button class="text-red-600 hover:text-red-800 text-xs font-medium px-2 py-1 rounded border border-red-300 btn-delete" data-id="${row.id}" data-serial="${row.serial}">Excluir</button>
                        </div>`;
                    }
                }
            ],
            language: {
                url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json"
            },
            order: [[0, 'asc']],
            initComplete: function () {
                // Apply default status filter
                var filterVal = $('#statusFilter').val();
                if (filterVal) {
                    this.api().column(4).search('^' + filterVal + '$', true, false).draw();
                }
            }
        });

        // Status filter dropdown
        $('#statusFilter').on('change', function () {
            var val = $(this).val();
            if (val) {
                dtTable.column(4).search('^' + val + '$', true, false).draw();
            } else {
                dtTable.column(4).search('').draw();
            }
        });

        $('#inventoryTable tbody').on('blur', '.edit-holder', function () {
            var el = $(this);
            updateUnit(el.data('id'), { holder: el.val() });
        });

        $('#inventoryTable tbody').on('change', '.edit-status', function () {
            var el = $(this);
            var newStatus = el.val();
            if (newStatus === 'SOLD') {
                if (!confirm('Marcar esta unidade como VENDIDA?')) {
                    // Revert select to previous value
                    el.val(el.data('prev') || 'AVAILABLE');
                    return;
                }
            }
            updateUnit(el.data('id'), { status: newStatus });
        });

        // Store previous status value on focus
        $('#inventoryTable tbody').on('focus', '.edit-status', function () {
            $(this).data('prev', $(this).val());
        });

        // Delete unit
        $('#inventoryTable tbody').on('click', '.btn-delete', function () {
            var id = $(this).data('id');
            var serial = $(this).data('serial');
            if (!confirm('Tem certeza que deseja excluir a unidade ' + serial + '? Esta ação não pode ser desfeita.')) {
                return;
            }
            guardedFetch('/api/unit/' + id, {
                method: 'DELETE'
            }).then(function (res) {
                if (!res) return;
                return res.json().then(function (body) {
                    if (res.ok && body.success) {
                        showToast('Unidade excluída!');
                        dtTable.ajax.reload(null, false);
                    } else {
                        showToast(body.error || 'Erro ao excluir', true);
                    }
                });
            }).catch(function () { /* handled by guard */ });
        });

        function updateUnit(id, data) {
            guardedFetch(`/api/unit/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(function (res) {
                if (!res) return;
                return res.json().then(function (body) {
                    if (res.ok && body.success) {
                        showToast('Atualizado!');
                        dtTable.ajax.reload(null, false);
                    } else {
                        showToast(body.error || 'Erro', true);
                    }
                });
            }).catch(function () { /* handled by guard */ });
        }
    });

    // Modal logic
    const modal = document.getElementById('modalNovaUnidade');

    function openModal() {
        // Load lots into select
        fetch('/api/lots').then(r => r.json()).then(res => {
            const select = document.getElementById('unitLot');
            if (!res.data || !res.data.length) {
                select.innerHTML = '<option value="">Nenhum lote cadastrado — crie um em Lotes</option>';
            } else {
                select.innerHTML = '<option value="">Selecione um lote...</option>' +
                    res.data.map(l => `<option value="${l.id}">${l.purchased_at} — ${l.supplier} (R$ ${parseFloat(l.exchange_rate).toFixed(4)})</option>`).join('');
            }
        });
        modal.classList.remove('hidden');
    }

    function closeModal() {
        modal.classList.add('hidden');
        document.getElementById('unitLot').value = '';
        document.getElementById('unitModelName').value = '';
        document.getElementById('unitStorageGb').value = '';
        document.getElementById('unitSerial').value = '';
        document.getElementById('unitUsdCost').value = '';
        document.getElementById('unitQuantity').value = '1';
        document.getElementById('unitHolder').value = '';
    }

    document.getElementById('fabBtn').addEventListener('click', openModal);
    document.getElementById('btnCloseModal').addEventListener('click', closeModal);
    document.getElementById('btnCancelModal').addEventListener('click', closeModal);
    modal.addEventListener('click', function (e) { if (e.target === modal) closeModal(); });

    document.getElementById('btnSaveUnit').addEventListener('click', function () {
        const lot_id = document.getElementById('unitLot').value;
        const model_name = document.getElementById('unitModelName').value.trim();
        const storage_gb = document.getElementById('unitStorageGb').value;
        const serial = document.getElementById('unitSerial').value.trim();
        const usd_cost = document.getElementById('unitUsdCost').value;
        const quantity = document.getElementById('unitQuantity').value;
        const holder = document.getElementById('unitHolder').value.trim();

        if (!lot_id) { alert('Selecione um lote.'); return; }
        if (!model_name) { alert('Informe o modelo.'); return; }
        if (!serial) { alert('Informe o serial.'); return; }
        if (!usd_cost || parseFloat(usd_cost) <= 0) { alert('Informe o custo USD.'); return; }
        if (!quantity || parseInt(quantity) < 1) { alert('Quantidade inválida.'); return; }

        guardedAction('create-unit', function () {
            return fetch('/api/unit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ lot_id, model_name, storage_gb: storage_gb || null, serial, usd_cost, quantity: parseInt(quantity), holder: holder || null })
            }).then(function (r) { return r.json(); }).then(function (res) {
                if (res.id) {
                    showToast('Unidade(s) criada(s)!');
                    closeModal();
                    dtTable.ajax.reload();
                } else {
                    showToast(res.error || 'Erro ao criar unidade', true);
                }
            });
        });
    });
</script>
{% endblock %}
